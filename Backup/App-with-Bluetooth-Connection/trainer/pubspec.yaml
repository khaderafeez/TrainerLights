name: trainerlights
description: TrainerLights reflex training companion app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bluetooth_serial: ^0.4.0   # BT Classic SPP
  sqflite: ^2.3.0                    # Local SQLite storage
  path: ^1.9.0
  fl_chart: ^0.68.0                  # Response time charts
  provider: ^6.1.1                   # State management
  intl: ^0.19.0                      # Date formatting
  permission_handler: ^11.3.0        # BT + location permissions

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
